<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PBuilders × Carlos Rueda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
    }

    .post {
      width: 1080px;
      height: 1080px;
      background: #0A0A0A;
      position: relative;
      overflow: hidden;
      display: flex;
    }

    /* FOTO — lado direito */
    .photo-side {
      position: absolute;
      right: 0;
      top: 0;
      width: 520px;
      height: 1080px;
    }

    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: grayscale(20%) brightness(0.85);
    }

    /* Gradiente que funde a foto com o fundo escuro */
    .photo-side::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, #0A0A0A 0%, rgba(10,10,10,0.3) 50%, transparent 100%),
        linear-gradient(to top, #0A0A0A 0%, transparent 30%);
    }

    /* Grid sutil de fundo */
    .post::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      z-index: 1;
    }

    /* CONTEÚDO — lado esquerdo */
    .content {
      position: relative;
      z-index: 2;
      width: 640px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 72px 64px;
    }

    /* HEADER */
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #F0F0F0;
      letter-spacing: -0.03em;
    }

    /* BODY */
    .body {
      display: flex;
      flex-direction: column;
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #555;
      margin-bottom: 28px;
    }

    .name {
      font-size: 86px;
      font-weight: 700;
      color: #F0F0F0;
      letter-spacing: -0.04em;
      line-height: 0.9;
      margin-bottom: 20px;
    }

    .role {
      font-size: 20px;
      font-weight: 400;
      color: #555;
      letter-spacing: -0.01em;
      margin-bottom: 48px;
    }

    .role strong {
      color: #888;
      font-weight: 600;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #ffffff;
      margin-bottom: 40px;
    }

    .description {
      font-size: 22px;
      font-weight: 400;
      color: #B0B0B0;
      line-height: 1.55;
      max-width: 460px;
    }

    .description strong {
      color: #F0F0F0;
      font-weight: 600;
    }

    /* FOOTER */
    .footer {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1px solid #1C1C1C;
      padding-top: 28px;
    }

    .footer-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      color: #3A3A3A;
      letter-spacing: 0.02em;
    }

    .footer-cg {
      font-size: 15px;
      font-weight: 400;
      color: #2E2E2E;
    }
  </style>
</head>
<body>
  <div class="post">

    <!-- FOTO -->
    <div class="photo-side">
      <img src="carlos-rueda.png" alt="Carlos Rueda">
    </div>

    <!-- CONTEÚDO -->
    <div class="content">

      <div class="logo">PBuilders</div>

      <div class="body">
        <div class="tag">Novo parceiro</div>
        <div class="name">Carlos<br>Rueda</div>
        <div class="role"><strong>CEO</strong> · Núcleo de Inteligência Competitiva<br>E.InovCG — Campina Grande</div>
        <div class="divider"></div>
        <div class="description">
          Levando a <strong>PBuilders</strong> pra dentro<br>
          do ecossistema de inovação<br>
          de <strong>Campina Grande.</strong>
        </div>
      </div>

      <div class="footer">
        <div class="footer-url">pbuilders.ai</div>
        <div class="footer-cg">Campina Grande, PB</div>
      </div>

    </div>
  </div>
</body>
</html>
