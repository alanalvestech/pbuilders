<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PBuilders × SantoTech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
    }

    .post {
      width: 1080px;
      height: 1080px;
      background: #0A0A0A;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 80px 64px;
    }

    /* Grid sutil */
    .post::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    .deco-circle {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.04);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .deco-circle-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.03);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .logo-pb {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #F0F0F0;
      letter-spacing: -0.03em;
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #555;
      border: 1px solid #2A2A2A;
      padding: 8px 20px;
      border-radius: 999px;
    }

    /* CENTRO */
    .center {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .partnership-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #444;
      margin-bottom: 52px;
    }

    .partner-logo {
      height: 200px;
      width: auto;
      margin-bottom: 56px;
      filter: brightness(0.9);
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #ffffff;
      margin-bottom: 40px;
    }

    .description {
      font-size: 28px;
      font-weight: 400;
      color: #B0B0B0;
      line-height: 1.5;
      max-width: 680px;
    }

    .description strong {
      color: #F0F0F0;
      font-weight: 600;
    }

    /* FOOTER */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
      border-top: 1px solid #1C1C1C;
      padding-top: 28px;
    }

    .footer-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      color: #3A3A3A;
    }

    .footer-cg {
      font-size: 15px;
      color: #2E2E2E;
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="deco-circle"></div>
    <div class="deco-circle-2"></div>

    <!-- HEADER -->
    <div class="header">
      <div class="logo-pb">PBuilders</div>
      <div class="tag">Parceria</div>
    </div>

    <!-- CENTRO -->
    <div class="center">
      <div class="partnership-label">Novo parceiro</div>
      <img class="partner-logo" src="../../../site/logo-santotech.png" alt="SantoTech Media">
      <div class="divider"></div>
      <div class="description">
        A PBuilders agora com cobertura<br>
        do <strong>maior portal de tech</strong><br>
        da <strong>Paraíba.</strong>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-url">pbuilders.ai</div>
      <div class="footer-cg">Campina Grande, PB</div>
    </div>
  </div>
</body>
</html>
