<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PBuilders — Glasswing Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
    }

    .slide {
      width: 1080px;
      height: 1080px;
      background: #0A0A0A;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 88px 80px 80px;
    }

    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    .deco-circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .logo-pb {
      font-size: 28px;
      font-weight: 700;
      color: #F0F0F0;
      letter-spacing: -0.03em;
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #555;
      border: 1px solid #2A2A2A;
      padding: 8px 20px;
      border-radius: 999px;
    }

    .body {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #444;
      margin-bottom: 40px;
    }

    .headline {
      font-size: 96px;
      font-weight: 700;
      line-height: 0.93;
      letter-spacing: -0.04em;
      color: #F0F0F0;
      margin-bottom: 44px;
    }

    .accent-line {
      width: 56px;
      height: 3px;
      background: #fff;
      margin-bottom: 40px;
    }

    .subline {
      font-size: 30px;
      font-weight: 400;
      color: #555;
      line-height: 1.5;
      max-width: 700px;
    }

    .subline strong {
      color: #909090;
      font-weight: 600;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
      border-top: 1px solid #1C1C1C;
      padding-top: 28px;
    }

    .footer-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      color: #3A3A3A;
    }

    .footer-cg {
      font-size: 20px;
      color: #2E2E2E;
    }
  </style>
</head>
<body>

  <div class="slide">
    <div class="deco-circle" style="width:800px;height:800px;bottom:-280px;right:-280px;"></div>
    <div class="deco-circle" style="width:500px;height:500px;bottom:-150px;right:-150px;opacity:0.6;"></div>

    <div class="header">
      <div class="logo-pb">PBuilders</div>
      <div class="tag">Glasswing</div>
    </div>

    <div class="body">
      <div class="eyebrow">Anthropic, 2026</div>
      <div class="headline">
        27 anos<br>escondida.<br>A IA achou.
      </div>
      <div class="accent-line"></div>
      <div class="subline">
        Google, Apple, Microsoft e mais 9 gigantes<br>
        no mesmo projeto de <strong>cibersegurança.</strong>
      </div>
    </div>

    <div class="footer">
      <div class="footer-url">pbuilders.ai</div>
      <div class="footer-cg">Paraíba</div>
    </div>
  </div>

</body>
</html>
