<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBuilders — Logo Tetris</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2a2a2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      padding: 3rem;
      font-family: 'Space Grotesk', sans-serif;
    }
    .label { color: #888; font-size: 14px; margin-bottom: -1.5rem; }
    .row { display: flex; gap: 2rem; align-items: center; }
    .preview { padding: 48px; border-radius: 16px; }
    .preview.light { background: #F5EDE4; }
    .preview.dark { background: #1A1A1A; }
    .avatar { width: 96px; height: 96px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .avatar.light { background: #F5EDE4; }
    .avatar.dark { background: #1A1A1A; }
    .avatar canvas { width: 60px; height: 60px; }
    .full-logo { display: flex; align-items: center; gap: 12px; }
    .full-logo span { font-size: 42px; font-weight: 700; letter-spacing: -0.03em; }
    .full-logo.on-light span { color: #1A1A1A; }
    .full-logo.on-dark span { color: #F5EDE4; }
  </style>
</head>
<body>

  <p class="label">Logo PB — Fundo claro</p>
  <div class="preview light">
    <canvas id="logo-light" width="520" height="340"></canvas>
  </div>

  <p class="label">Logo PB — Fundo escuro</p>
  <div class="preview dark">
    <canvas id="logo-dark" width="520" height="340"></canvas>
  </div>

  <p class="label">Com texto — Fundo claro</p>
  <div class="preview light">
    <div class="full-logo on-light">
      <canvas id="logo-text-light" width="260" height="170"></canvas>
      <span>uilders</span>
    </div>
  </div>

  <p class="label">Com texto — Fundo escuro</p>
  <div class="preview dark">
    <div class="full-logo on-dark">
      <canvas id="logo-text-dark" width="260" height="170"></canvas>
      <span>uilders</span>
    </div>
  </div>

  <p class="label">Avatar 96px</p>
  <div class="row">
    <div class="avatar light"><canvas id="av-light" width="120" height="120"></canvas></div>
    <div class="avatar dark"><canvas id="av-dark" width="120" height="120"></canvas></div>
  </div>

<script>
// ===== GRID DEFINITIONS =====
// 0 = empty, 1-6 = piece IDs
// Each letter: 6 cols x 8 rows

const P = [
  [1,1,2,2,2,0],
  [1,1,0,0,3,3],
  [4,4,0,0,3,3],
  [4,4,2,2,2,0],
  [4,4,0,0,0,0],
  [5,5,0,0,0,0],
  [5,5,0,0,0,0],
  [5,5,0,0,0,0],
];

const B = [
  [1,1,1,1,1,0],
  [2,2,0,0,3,3],
  [2,2,0,0,3,3],
  [4,4,4,4,4,0],
  [2,2,0,0,5,5],
  [2,2,0,0,5,5],
  [2,2,0,0,5,5],
  [1,1,1,1,1,0],
];

const COLORS = {
  1: '#AB4C31',  // terracotta
  2: '#C4673E',  // burnt orange
  3: '#D4A574',  // sand
  4: '#7F3325',  // deep brown
  5: '#963F29',  // mid brown
};

const COLORS_DARK = {
  1: '#C45A3A',
  2: '#D4763E',
  3: '#E0B882',
  4: '#984030',
  5: '#B05035',
};

// ===== DRAWING ENGINE =====

function drawLogo(canvasId, cellSize, gap, darkMode) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const colors = darkMode ? COLORS_DARK : COLORS;
  const outlineColor = darkMode ? '#F5EDE4' : '#1A1A1A';
  const gridLineColor = darkMode ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.1)';
  const outlineWidth = cellSize * 0.07;
  const gridLineWidth = cellSize * 0.025;
  const radius = cellSize * 0.12;

  const letterSpacing = cellSize * 1.2;

  function drawGrid(grid, offsetX, offsetY) {
    const rows = grid.length;
    const cols = grid[0].length;

    // 1. Fill cells
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const pid = grid[r][c];
        if (pid === 0) continue;
        const x = offsetX + c * (cellSize + gap);
        const y = offsetY + r * (cellSize + gap);
        ctx.fillStyle = colors[pid];
        roundRect(ctx, x, y, cellSize, cellSize, radius);
        ctx.fill();
      }
    }

    // 2. Draw internal grid lines (between same-piece cells)
    ctx.strokeStyle = gridLineColor;
    ctx.lineWidth = gridLineWidth;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const pid = grid[r][c];
        if (pid === 0) continue;
        const x = offsetX + c * (cellSize + gap);
        const y = offsetY + r * (cellSize + gap);
        // Right neighbor same piece
        if (c < cols - 1 && grid[r][c+1] === pid) {
          ctx.beginPath();
          ctx.moveTo(x + cellSize + gap/2, y + radius);
          ctx.lineTo(x + cellSize + gap/2, y + cellSize - radius);
          ctx.stroke();
        }
        // Bottom neighbor same piece
        if (r < rows - 1 && grid[r+1][c] === pid) {
          ctx.beginPath();
          ctx.moveTo(x + radius, y + cellSize + gap/2);
          ctx.lineTo(x + cellSize - radius, y + cellSize + gap/2);
          ctx.stroke();
        }
      }
    }

    // 3. Draw piece outlines
    const pieceIds = [...new Set(grid.flat().filter(x => x > 0))];
    for (const pid of pieceIds) {
      const outline = getOutlineSegments(grid, pid);
      ctx.strokeStyle = outlineColor;
      ctx.lineWidth = outlineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      for (const seg of outline) {
        const x1 = offsetX + seg.x1 * (cellSize + gap) - gap/2;
        const y1 = offsetY + seg.y1 * (cellSize + gap) - gap/2;
        const x2 = offsetX + seg.x2 * (cellSize + gap) - gap/2;
        const y2 = offsetY + seg.y2 * (cellSize + gap) - gap/2;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    }
  }

  // Calculate offset to center both letters
  const totalW = 6 * (cellSize + gap) - gap + letterSpacing + 6 * (cellSize + gap) - gap;
  const totalH = 8 * (cellSize + gap) - gap;
  const startX = (canvas.width - totalW) / 2;
  const startY = (canvas.height - totalH) / 2;

  drawGrid(P, startX, startY);
  drawGrid(B, startX + 6 * (cellSize + gap) - gap + letterSpacing, startY);
}

function getOutlineSegments(grid, pieceId) {
  const segments = [];
  const rows = grid.length;
  const cols = grid[0].length;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[r][c] !== pieceId) continue;
      // Top edge
      if (r === 0 || grid[r-1][c] !== pieceId) {
        segments.push({x1: c, y1: r, x2: c+1, y2: r});
      }
      // Bottom edge
      if (r === rows-1 || grid[r+1][c] !== pieceId) {
        segments.push({x1: c, y1: r+1, x2: c+1, y2: r+1});
      }
      // Left edge
      if (c === 0 || grid[r][c-1] !== pieceId) {
        segments.push({x1: c, y1: r, x2: c, y2: r+1});
      }
      // Right edge
      if (c === cols-1 || grid[r][c+1] !== pieceId) {
        segments.push({x1: c+1, y1: r, x2: c+1, y2: r+1});
      }
    }
  }
  return segments;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== RENDER ALL VERSIONS =====
drawLogo('logo-light', 36, 5, false);
drawLogo('logo-dark', 36, 5, true);
drawLogo('logo-text-light', 18, 3, false);
drawLogo('logo-text-dark', 18, 3, true);
drawLogo('av-light', 12, 2, false);
drawLogo('av-dark', 12, 2, true);
</script>

</body>
</html>
