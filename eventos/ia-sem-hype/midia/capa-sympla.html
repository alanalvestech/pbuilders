<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
    }

    .slide {
      width: 1600px;
      height: 838px;
      background: #0A0A0A;
      position: relative;
      overflow: hidden;
      display: flex;
      gap: 0;
    }

    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    /* ── Coluna esquerda: headline domina ── */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 60px 56px 80px;
      border-right: 1px solid #181818;
      position: relative;
      z-index: 1;
    }

    .logo-pb {
      font-size: 30px;
      font-weight: 700;
      color: #F0F0F0;
      letter-spacing: -0.03em;
    }

    .headline {
      font-size: 185px;
      font-weight: 700;
      line-height: 0.86;
      letter-spacing: -0.04em;
      color: #F0F0F0;
    }

    .headline .hype {
      color: #555;
      text-decoration: line-through;
      text-decoration-thickness: 8px;
      text-decoration-color: #F0F0F0;
    }

    .left-footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      color: #252525;
    }

    /* ── Coluna direita: info em dois níveis ── */
    .right {
      width: 480px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 80px 56px 60px;
      position: relative;
      z-index: 1;
    }

    /* Nível 1 — visível no thumbnail */
    .info-primary {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .free-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 72px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: #F0F0F0;
      line-height: 1;
      margin-bottom: 20px;
    }

    .date-big {
      font-family: 'JetBrains Mono', monospace;
      font-size: 52px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: #555;
      line-height: 1.1;
    }

    .time-big {
      font-family: 'JetBrains Mono', monospace;
      font-size: 52px;
      font-weight: 700;
      color: #444;
      line-height: 1.1;
    }

    /* Nível 2 — visível em tamanho cheio */
    .info-secondary {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid #1C1C1C;
      padding-top: 24px;
    }

    .venue {
      font-family: 'JetBrains Mono', monospace;
      font-size: 17px;
      color: #3A3A3A;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .topics { display: flex; flex-direction: column; gap: 10px; }

    .topic {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 400;
      color: #3A3A3A;
    }

    .topic-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #2A2A2A;
      flex-shrink: 0;
    }

    .tag-encontro {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #333;
      border: 1px solid #222;
      padding: 6px 16px;
      border-radius: 999px;
      align-self: flex-start;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="slide">

    <div class="left">
      <div class="logo-pb">PBuilders</div>
      <div class="headline">IA sem<br><span class="hype">Hype</span></div>
      <div class="left-footer">pbuilders.ai</div>
    </div>

    <div class="right">
      <div class="info-primary">
        <div class="free-badge">Grátis</div>
        <div class="date-big">Sáb 25 Abr</div>
        <div class="time-big">08h00</div>
      </div>
      <div class="info-secondary">
        <div class="venue">Sebrae · Campina Grande<br>R. Cônsul Joseph Noujaim Habib, 800 · Catolé</div>
        <div class="topics">
          <div class="topic"><span class="topic-dot"></span>Demo ao vivo com Claude Code</div>
          <div class="topic"><span class="topic-dot"></span>Mão na massa: construa seu projeto</div>
          <div class="topic"><span class="topic-dot"></span>Apresente o que você fez</div>
          <div class="topic"><span class="topic-dot"></span>Networking</div>
          <div class="topic" style="color:#282828;margin-top:4px;"><span class="topic-dot" style="background:#222;"></span>Sem certificado</div>
        </div>
        <div class="tag-encontro">1º Encontro PBuilders</div>
      </div>
    </div>

  </div>

</body>
</html>
