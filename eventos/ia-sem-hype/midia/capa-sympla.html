<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
    }

    .slide {
      width: 1600px;
      height: 838px;
      background: #0A0A0A;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 60px 90px;
    }

    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .logo-pb {
      font-size: 30px;
      font-weight: 700;
      color: #F0F0F0;
      letter-spacing: -0.03em;
    }

    .free-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 60px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #0A0A0A;
      background: #F0F0F0;
      padding: 10px 44px;
      border-radius: 999px;
      line-height: 1;
    }

    /* ── Headline ── */
    .body {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .headline {
      font-size: 205px;
      font-weight: 700;
      line-height: 0.87;
      letter-spacing: -0.01em;
      white-space: nowrap;
      color: #F0F0F0;
    }

    .headline .hype {
      color: #555;
      text-decoration: line-through;
      text-decoration-thickness: 9px;
      text-decoration-color: #F0F0F0;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 56px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #888;
    }

    .location {
      font-family: 'JetBrains Mono', monospace;
      font-size: 40px;
      font-weight: 700;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="slide">

    <div class="header">
      <div class="free-badge">Grátis</div>
    </div>

    <div class="body">
      <div class="headline">
        IA sem <span class="hype">Hype</span>
      </div>
    </div>

    <div class="footer">
      <div class="date">Sáb · 25 Abr · 08h</div>
      <div class="location">Campina Grande</div>
    </div>

  </div>

</body>
</html>
