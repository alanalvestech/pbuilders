<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PBuilders — 1º Encontro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
    }

    .slide {
      width: 1080px;
      height: 1080px;
      background: #0A0A0A;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 80px;
    }

    .top {
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: 44px;
      font-weight: 700;
      color: #F0F0F0;
      letter-spacing: -0.03em;
    }

    .middle {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    .headline {
      font-size: 180px;
      font-weight: 700;
      line-height: 0.88;
      letter-spacing: -0.05em;
      color: #F0F0F0;
    }

    .hype {
      color: #4A4A4A;
      text-decoration: line-through;
      text-decoration-color: #4A4A4A;
      text-decoration-thickness: 9px;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-line {
      font-size: 52px;
      font-weight: 500;
      color: #777;
      letter-spacing: -0.02em;
    }

    .info-line.highlight {
      color: #F0F0F0;
    }

    .bottom {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .apoio {
      font-size: 24px;
      color: #333;
      letter-spacing: 0.02em;
    }

    .site {
      font-size: 24px;
      color: #2A2A2A;
    }
  </style>
</head>
<body>

  <div class="slide">

    <div class="top">
      <div class="logo">PBuilders</div>
    </div>

    <div class="middle">
      <div class="headline">IA sem<br><span class="hype">Hype</span></div>
      <div class="info">
        <div class="info-line highlight">25 Abr · 8h às 12h</div>
        <div class="info-line">Sebrae · Campina Grande</div>
        <div class="info-line">Gratuito · 30 vagas</div>
      </div>
    </div>

    <div class="bottom">
      <div class="apoio">Apoio: E.InovCG · CG Criativa · Sebrae</div>
      <div class="site">pbuilders.ai</div>
    </div>

  </div>

</body>
</html>
