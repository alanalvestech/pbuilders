<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PBuilders — 1º Encontro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
    }

    .slide {
      width: 1080px;
      height: 1080px;
      background: #0A0A0A;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 80px;
    }

    /* Grid sutil */
    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    /* Glow no canto superior direito */
    .glow {
      position: absolute;
      top: -180px;
      right: -180px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Linha de acento vertical esquerda */
    .accent-bar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(to bottom, transparent 0%, #fff 30%, #fff 70%, transparent 100%);
      opacity: 0.12;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .logo-pb {
      font-size: 28px;
      font-weight: 700;
      color: #F0F0F0;
      letter-spacing: -0.03em;
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #F0F0F0;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
    }

    .body {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #555;
      margin-bottom: 40px;
    }

    .headline {
      font-size: 140px;
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.05em;
      color: #F0F0F0;
      margin-bottom: 48px;
    }

    .hype {
      color: #555;
      text-decoration: line-through;
      text-decoration-color: #555;
      text-decoration-thickness: 6px;
    }

    .accent-line {
      width: 48px;
      height: 3px;
      background: #fff;
      margin-bottom: 40px;
    }

    .topics {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topic {
      font-size: 26px;
      font-weight: 400;
      color: #888;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topic::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
      border-top: 1px solid #1C1C1C;
      padding-top: 28px;
    }

    .footer-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      color: #555;
      letter-spacing: 0.08em;
    }

    .footer-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      color: #3A3A3A;
    }
  </style>
</head>
<body>

  <div class="slide">
    <div class="glow"></div>
    <div class="accent-bar"></div>

    <div class="header">
      <div class="logo-pb">PBuilders</div>
      <div class="tag">1º Encontro</div>
    </div>

    <div class="body">
      <div class="eyebrow">25 ABR · 8h às 12h · Campina Grande</div>
      <div class="headline">
        IA sem <span class="hype">Hype</span>
      </div>
      <div class="accent-line"></div>
      <div class="topics">
        <div class="topic">Demo ao vivo com Claude Code</div>
        <div class="topic">Setup na sua máquina</div>
        <div class="topic">Desafio prático (90 min)</div>
        <div class="topic">Show &amp; Tell</div>
        <div class="topic">Networking + café</div>
        <div class="topic">Gratuito · 30 vagas</div>
        <div class="topic">Sebrae Campina Grande, PB</div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-date">Apoio: E.InovCG · CG Criativa · Sebrae</div>
      <div class="footer-url">pbuilders.ai</div>
    </div>
  </div>

</body>
</html>
